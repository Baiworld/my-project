spark {
  app.name = "RealTimeAnalysis"
  master = "local[*]"
  batch.interval.seconds = 10
  checkpoint.path = "checkpoints/streaming-v2"
}

kafka {
  bootstrap.servers = "192.168.88.134:9092"
  group.id = "spark-streaming-consumer-v5"
  topics = ["user_behavior", "content_metadata", "user_register"]
  maxOffsetsPerTrigger = 10000
}

streaming {
  window {
    user-profile-seconds = 300    # 5 min sliding window
    user-profile-slide-seconds = 150
    content-hot-seconds = 60      # 1 min tumbling window
    dedup-seconds = 60            # dedup window
  }
  watermark.seconds = 30          # late data tolerance
  coldstart {
    k = 8
    behavior-threshold = 50
  }
}

mysql {
  url = "jdbc:mysql://192.168.88.134:3306/recommend_db"
  user = "app"
  password = "app123"
  batch.size = 1000
}
