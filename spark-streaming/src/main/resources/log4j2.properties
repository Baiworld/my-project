# Spark Streaming 日志配置 — 输出到文件 + 控制台
name = HybridRecSys

# 控制台输出
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n

# 文件输出（按大小滚动）
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = logs/spark-streaming.log
appender.file.filePattern = logs/spark-streaming-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 5

# 根日志级别
rootLogger.level = WARN
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File

# 项目包日志级别（更详细）
logger.recommend.name = com.recommend
logger.recommend.level = INFO
