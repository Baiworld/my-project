# ============================================================================
# Flume 配置文件 — 冷启动音乐与视频混合推荐系统
#
# 3 条独立 Pipeline，每条负责一个 Kafka Topic：
#   Source (tail -F 输出日志) → Memory Channel → Kafka Sink
#
# 用法:
#   flume-ng agent -n agent -c conf -f flume.conf -Dflume.root.logger=INFO,console
#
# 前置条件:
#   1. 先启动 feed_data.sh start 开始写入输出日志
#   2. 确保 Kafka 已启动 (localhost:9092)
#   3. 确保 Kafka 中已创建 3 个 Topic:
#      kafka-topics.sh --create --topic user_behavior    --bootstrap-server localhost:9092 --partitions 3 --replication-factor 2
#      kafka-topics.sh --create --topic content_metadata --bootstrap-server localhost:9092 --partitions 2 --replication-factor 2
#      kafka-topics.sh --create --topic user_register    --bootstrap-server localhost:9092 --partitions 2 --replication-factor 2
# ============================================================================

# ── Agent 定义 ──
agent.sources   = src_behavior src_metadata src_register
agent.channels  = ch_behavior ch_metadata ch_register
agent.sinks     = sink_behavior sink_metadata sink_register

# ============================================================================
# Pipeline 1: user_behavior → Kafka topic: user_behavior
# ============================================================================

agent.sources.src_behavior.type = exec
agent.sources.src_behavior.command = tail -F /opt/recommend/data-generator/output/user_behavior.log
agent.sources.src_behavior.batchSize = 10
agent.sources.src_behavior.interceptors = i_timestamp

agent.channels.ch_behavior.type = memory
agent.channels.ch_behavior.capacity = 10000
agent.channels.ch_behavior.transactionCapacity = 100

agent.sinks.sink_behavior.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.sink_behavior.kafka.topic = user_behavior
agent.sinks.sink_behavior.kafka.bootstrap.servers = localhost:9092
agent.sinks.sink_behavior.kafka.producer.acks = 1
agent.sinks.sink_behavior.kafka.producer.compression.type = snappy
agent.sinks.sink_behavior.kafka.producer.linger.ms = 5
agent.sinks.sink_behavior.kafka.producer.batch.size = 16384

agent.sources.src_behavior.channels = ch_behavior
agent.sinks.sink_behavior.channel = ch_behavior

# ============================================================================
# Pipeline 2: content_metadata → Kafka topic: content_metadata
# ============================================================================

agent.sources.src_metadata.type = exec
agent.sources.src_metadata.command = tail -F /opt/recommend/data-generator/output/content_metadata.log
agent.sources.src_metadata.batchSize = 10
agent.sources.src_metadata.interceptors = i_timestamp

agent.channels.ch_metadata.type = memory
agent.channels.ch_metadata.capacity = 10000
agent.channels.ch_metadata.transactionCapacity = 100

agent.sinks.sink_metadata.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.sink_metadata.kafka.topic = content_metadata
agent.sinks.sink_metadata.kafka.bootstrap.servers = localhost:9092
agent.sinks.sink_metadata.kafka.producer.acks = 1
agent.sinks.sink_metadata.kafka.producer.compression.type = snappy
agent.sinks.sink_metadata.kafka.producer.linger.ms = 5
agent.sinks.sink_metadata.kafka.producer.batch.size = 16384

agent.sources.src_metadata.channels = ch_metadata
agent.sinks.sink_metadata.channel = ch_metadata

# ============================================================================
# Pipeline 3: user_register → Kafka topic: user_register
# ============================================================================

agent.sources.src_register.type = exec
agent.sources.src_register.command = tail -F /opt/recommend/data-generator/output/user_register.log
agent.sources.src_register.batchSize = 10
agent.sources.src_register.interceptors = i_timestamp

agent.channels.ch_register.type = memory
agent.channels.ch_register.capacity = 10000
agent.channels.ch_register.transactionCapacity = 100

agent.sinks.sink_register.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.sink_register.kafka.topic = user_register
agent.sinks.sink_register.kafka.bootstrap.servers = localhost:9092
agent.sinks.sink_register.kafka.producer.acks = 1
agent.sinks.sink_register.kafka.producer.compression.type = snappy
agent.sinks.sink_register.kafka.producer.linger.ms = 5
agent.sinks.sink_register.kafka.producer.batch.size = 16384

agent.sources.src_register.channels = ch_register
agent.sinks.sink_register.channel = ch_register

# ============================================================================
# 共享 Interceptor: 为每条消息添加处理时间戳 Header
# ============================================================================

agent.sources.src_behavior.interceptors.i_timestamp.type = timestamp
agent.sources.src_metadata.interceptors.i_timestamp.type = timestamp
agent.sources.src_register.interceptors.i_timestamp.type = timestamp
