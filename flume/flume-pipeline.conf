# ============================================================================
# Flume 配置 — 冷启动推荐系统数据管道
#
# 3条数据流 → 3个Kafka Topic:
#   行为输出文件   →  kafka sink → user_behavior
#   元数据输出文件  →  kafka sink → content_metadata
#   注册输出文件   →  kafka sink → user_register
#
# 用法:
#   flume-ng agent -n a1 -c conf -f flume-pipeline.conf
# ============================================================================

# ── Agent 定义 ──────────────────────────────────────────────────
a1.sources  = src_behavior src_metadata src_register
a1.channels = ch_behavior ch_metadata ch_register
a1.sinks    = sink_behavior sink_metadata sink_register

# ====================================================================
#  Flow 1: user_behavior
# ====================================================================

a1.sources.src_behavior.type = exec
a1.sources.src_behavior.command = tail -F /export/data/BD2_data/user_behavior.log
a1.sources.src_behavior.batchSize = 10
a1.sources.src_behavior.interceptors = ts_behavior
a1.sources.src_behavior.interceptors.ts_behavior.type = timestamp

a1.channels.ch_behavior.type = memory
a1.channels.ch_behavior.capacity = 10000
a1.channels.ch_behavior.transactionCapacity = 100

a1.sinks.sink_behavior.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.sink_behavior.kafka.topic = user_behavior
a1.sinks.sink_behavior.kafka.bootstrap.servers = node1:9092
a1.sinks.sink_behavior.kafka.producer.acks = 1
a1.sinks.sink_behavior.kafka.producer.compression.type = snappy
a1.sinks.sink_behavior.kafka.producer.linger.ms = 5
a1.sinks.sink_behavior.kafka.producer.batch.size = 16384

a1.sources.src_behavior.channels = ch_behavior
a1.sinks.sink_behavior.channel = ch_behavior

# ====================================================================
#  Flow 2: content_metadata
# ====================================================================

a1.sources.src_metadata.type = exec
a1.sources.src_metadata.command = tail -F /export/data/BD2_data/content_metadata.log
a1.sources.src_metadata.batchSize = 5
a1.sources.src_metadata.interceptors = ts_metadata
a1.sources.src_metadata.interceptors.ts_metadata.type = timestamp

a1.channels.ch_metadata.type = memory
a1.channels.ch_metadata.capacity = 5000
a1.channels.ch_metadata.transactionCapacity = 50

a1.sinks.sink_metadata.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.sink_metadata.kafka.topic = content_metadata
a1.sinks.sink_metadata.kafka.bootstrap.servers = node1:9092
a1.sinks.sink_metadata.kafka.producer.acks = 1
a1.sinks.sink_metadata.kafka.producer.compression.type = snappy
a1.sinks.sink_metadata.kafka.producer.linger.ms = 5
a1.sinks.sink_metadata.kafka.producer.batch.size = 16384

a1.sources.src_metadata.channels = ch_metadata
a1.sinks.sink_metadata.channel = ch_metadata

# ====================================================================
#  Flow 3: user_register
# ====================================================================

a1.sources.src_register.type = exec
a1.sources.src_register.command = tail -F /export/data/BD2_data/user_register.log
a1.sources.src_register.batchSize = 5
a1.sources.src_register.interceptors = ts_register
a1.sources.src_register.interceptors.ts_register.type = timestamp

a1.channels.ch_register.type = memory
a1.channels.ch_register.capacity = 5000
a1.channels.ch_register.transactionCapacity = 50

a1.sinks.sink_register.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.sink_register.kafka.topic = user_register
a1.sinks.sink_register.kafka.bootstrap.servers = node1:9092
a1.sinks.sink_register.kafka.producer.acks = 1
a1.sinks.sink_register.kafka.producer.compression.type = snappy
a1.sinks.sink_register.kafka.producer.linger.ms = 5
a1.sinks.sink_register.kafka.producer.batch.size = 16384

a1.sources.src_register.channels = ch_register
a1.sinks.sink_register.channel = ch_register
