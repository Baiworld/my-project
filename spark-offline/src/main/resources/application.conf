spark {
  app.name = "OfflineAnalysis"
  master = "local[*]"
}

scheduler {
  user-portrait.cron = "0 0 */6 * * ?"       # every 6 hours
  similarity.cron = "0 30 */6 * * ?"
  recommendation.cron = "0 0 2 * * ?"        # 2 AM daily
  metrics.cron = "0 0 3 * * ?"               # 3 AM daily
}

als {
  rank = 50
  maxIter = 20
  regParam = 0.1
  alpha = 40.0      # implicit feedback confidence
  model.path = "models/als"
}

item2vec {
  vectorSize = 64
  windowSize = 5
  minCount = 5
}

dpp {
  theta = 0.7       # diversity weight
}

coldstart {
  k = 8
  epsilon = 0.15    # exploration rate
  music-video-ratio = 0.6
  transition.start = 30
  transition.end = 80
}

mysql {
  url = "jdbc:mysql://192.168.88.134:3306/recommend_db"
  user = "app"
  password = "app123"
}
